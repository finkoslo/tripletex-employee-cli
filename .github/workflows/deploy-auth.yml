name: Deploy Auth Function

on:
  push:
    branches: [main]
    paths:
      - 'server/**'
  workflow_dispatch:

defaults:
  run:
    working-directory: server

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Install Scaleway CLI
        run: |
          curl -o /usr/local/bin/scw -L "https://github.com/scaleway/scaleway-cli/releases/download/v2.52.0/scaleway-cli_2.52.0_linux_amd64"
          chmod +x /usr/local/bin/scw

      - name: Package function
        run: |
          mkdir -p package
          cp -r dist package/
          cp package.json package-lock.json package/
          cd package && npm ci --omit=dev
          cd .. && zip -r function.zip package/

      - name: Deploy to Scaleway
        env:
          SCW_ACCESS_KEY: ${{ secrets.SCW_ACCESS_KEY }}
          SCW_SECRET_KEY: ${{ secrets.SCW_SECRET_KEY }}
          SCW_DEFAULT_ORGANIZATION_ID: ${{ secrets.SCW_DEFAULT_ORGANIZATION_ID }}
          SCW_DEFAULT_PROJECT_ID: ${{ secrets.SCW_DEFAULT_PROJECT_ID }}
        run: |
          scw function deploy \
            name=tripletex-employee-auth \
            namespace-id=${{ secrets.SCW_FUNCTIONS_NAMESPACE_ID }} \
            runtime=node22 \
            zip-file=function.zip \
            region=nl-ams
