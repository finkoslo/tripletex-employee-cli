name: Release

on:
  push:
    branches: [main]
    paths: ['src/Tripletex.EmployeeCli/**']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.bump.outputs.NEW_TAG }}
      version: ${{ steps.bump.outputs.VERSION }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get latest tag and bump patch
        id: bump
        run: |
          LATEST=$(git describe --tags --match 'v*' --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "Latest tag: $LATEST"
          VERSION="${LATEST#v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          NEW_TAG="v${MAJOR}.${MINOR}.$((PATCH + 1))"
          echo "New tag: $NEW_TAG"
          echo "VERSION=${NEW_TAG#v}" >> "$GITHUB_OUTPUT"
          echo "NEW_TAG=$NEW_TAG" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        run: |
          git tag ${{ steps.bump.outputs.NEW_TAG }}
          git push origin ${{ steps.bump.outputs.NEW_TAG }}

  build:
    needs: [tag]
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
            artifact: tripletex-employee-linux-x64
          - os: ubuntu-latest
            rid: linux-arm64
            artifact: tripletex-employee-linux-arm64
          - os: macos-latest
            rid: osx-arm64
            artifact: tripletex-employee-osx-arm64
          - os: macos-latest
            rid: osx-x64
            artifact: tripletex-employee-osx-x64
          - os: windows-latest
            rid: win-x64
            artifact: tripletex-employee-win-x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Publish
        run: >
          dotnet publish src/Tripletex.EmployeeCli/Tripletex.EmployeeCli.csproj
          -c Release
          -r ${{ matrix.rid }}
          -p:Version=${{ needs.tag.outputs.version }}
          -o ./publish

      - name: Archive (unix)
        if: runner.os != 'Windows'
        run: tar -czf ${{ matrix.artifact }}.tar.gz -C publish finkletex

      - name: Archive (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path publish/finkletex.exe -DestinationPath ${{ matrix.artifact }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.*

  release:
    needs: [tag, build]
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.tag.outputs.tag }}
          generate_release_notes: true
          files: artifacts/*
