service: tripletex-employee-auth

plugins:
  - serverless-scaleway-functions

provider:
  name: scaleway
  runtime: node22
  scwRegion: fr-par

package:
  patterns:
    - "!node_modules/**"
    - "!.gitignore"
    - "!.git/**"
    - "!*.ts"
    - "!tsconfig.json"

functions:
  auth:
    handler: dist/handler.handle
    minScale: 0
    maxScale: 5
    memoryLimit: 256
    timeout: 30s
    privacy: public
    httpOption: enabled
    env:
      ALLOWED_DOMAIN: fink.no
    # Secrets are managed in the Scaleway console (Security & tokens tab):
    # GOOGLE_CLIENT_ID, GOOGLE_CLIENT_SECRET, TRIPLETEX_CONSUMER_TOKEN,
    # TRIPLETEX_EMPLOYEE_TOKEN, HMAC_SECRET, FUNCTION_URL
